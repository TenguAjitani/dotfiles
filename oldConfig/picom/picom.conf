#################################
# Picom (pijulius fork) Config #
#################################

# Set the backend (use `glx` for better performance)
backend = "glx";

# Enable rounded corners
corner-radius = 6;  # Adjust as needed

# Exclude specific windows from rounded corners
rounded-corners-exclude = [
    "window_type = 'dock'",   # Exclude docks (like polybar)
    "window_type = 'desktop'",
    "class_g = 'slop'",       # Exclude screen selection tools
    "class_g = 'mpv'",         # Exclude mpv to avoid weird artifacts
    "class_g = 'Polybar'"
];

# Opacity settings (optional)
inactive-opacity = 0.9;  # Slightly transparent inactive windows
active-opacity = 1.0;     # Fully visible active window

# Disable blur if not needed
blur = { enabled = false; }

# Set fading (optional)
fading = true;
fade-in-step = 0.1;
fade-out-step = 0.1;
